{{- if .Values.modelServing.enabled }}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: mlops-studio-model-serving
  labels:
    app: mlops-studio-model-serving
spec:
  replicas: {{ .Values.modelServing.replicas }}
  selector:
    matchLabels:
      app: mlops-studio-model-serving
  template:
    metadata:
      labels:
        app: mlops-studio-model-serving
    spec:
      containers:
        - name: model-serving
          image: "{{ .Values.modelServing.image.repository }}:{{ .Values.modelServing.image.tag }}"
          imagePullPolicy: {{ .Values.modelServing.image.pullPolicy }}
          ports:
            - containerPort: 8000
          env:
            {{- range $k, $v := .Values.modelServing.env }}
            - name: {{ $k }}
              value: {{ $v | quote }}
            {{- end }}
          readinessProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 15
            periodSeconds: 20

---
apiVersion: v1
kind: Service
metadata:
  name: mlops-studio-model-serving
  labels:
    app: mlops-studio-model-serving
spec:
  type: {{ .Values.modelServing.service.type }}
  selector:
    app: mlops-studio-model-serving
  ports:
    - name: http
      port: {{ .Values.modelServing.service.port }}
      targetPort: 8000
{{- end }}

