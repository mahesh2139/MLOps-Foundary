apiVersion: apps/v1
kind: Deployment
metadata:
  name: mlops-studio-backend
  labels:
    app: mlops-studio-backend
spec:
  replicas: {{ .Values.backend.replicas }}
  selector:
    matchLabels:
      app: mlops-studio-backend
  template:
    metadata:
      labels:
        app: mlops-studio-backend
    spec:
      {{- if .Values.imagePullSecrets }}
      imagePullSecrets:
        {{- toYaml .Values.imagePullSecrets | nindent 8 }}
      {{- end }}
      containers:
        - name: backend
          image: "{{ .Values.backend.image.repository }}:{{ .Values.backend.image.tag }}"
          imagePullPolicy: {{ .Values.backend.image.pullPolicy }}
          ports:
            - containerPort: 5000
          env:
            {{- range $k, $v := .Values.backend.env }}
            - name: {{ $k }}
              value: {{ $v | quote }}
            {{- end }}
          readinessProbe:
            httpGet:
              path: /health
              port: 5000
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /health
              port: 5000
            initialDelaySeconds: 15
            periodSeconds: 20

---
apiVersion: v1
kind: Service
metadata:
  name: mlops-studio-backend
  labels:
    app: mlops-studio-backend
spec:
  type: {{ .Values.backend.service.type }}
  selector:
    app: mlops-studio-backend
  ports:
    - name: http
      port: {{ .Values.backend.service.port }}
      targetPort: 5000

